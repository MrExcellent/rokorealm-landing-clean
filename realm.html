<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ROKO REALM — Selector</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050509;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .container {
      text-align: center;
    }

    h1 {
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
      font-size: 1.8rem;
    }

    .realms {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .realm-btn {
      padding: 1rem 2rem;
      background: #ffffff10;
      border: 1px solid #ffffff40;
      color: #fff;
      font-size: 1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .realm-btn:hover {
      background: #ffffff20;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>SELECT YOUR REALM</h1>

    <div class="realms">
      <button class="realm-btn" onclick="enter('hive')">HIVE CITY</button>
      <button class="realm-btn" onclick="enter('deadsea')">DEAD SEA</button>
      <button class="realm-btn" onclick="enter('starship')">STARSHIP</button>
      <button class="realm-btn" onclick="enter('forbidden')">FORBIDDEN BIOME</button>
    </div>
  </div>

  <script>
    function enter(realm) {
      alert("Entering " + realm.toUpperCase() + " (placeholder)");
      // Future: redirect to realm-specific engine
    }
  </script>
</body>
</html>
